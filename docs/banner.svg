<svg width="100%" viewBox="0 0 1900 60" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: 21px; }
    .kw  { fill: #58a6ff; font-weight: bold; }
    .tag { fill: #3fb950; font-weight: bold; }
    .sep { fill: #30363d; }
    .ticker { animation: ticker 8s linear infinite; }
    @keyframes ticker {
      0%     { transform: translateY(0px);    }
      5%     { transform: translateY(0px);    }
      20%    { transform: translateY(-32px);  }
      25%    { transform: translateY(-32px);  }
      45%    { transform: translateY(-64px);  }
      50%    { transform: translateY(-64px);  }
      70%    { transform: translateY(-96px);  }
      75%    { transform: translateY(-96px);  }
      99.99% { transform: translateY(-128px); }
      100%   { transform: translateY(0px);    }
    }
  </style>
  <defs>
    <clipPath id="clip"><rect x="0" y="10" width="1900" height="40"/></clipPath>
  </defs>

  <rect width="1900" height="60" rx="6" fill="#0d1117"/>
  <rect width="1900" height="60" rx="6" fill="none" stroke="#30363d" stroke-width="1"/>

  <g clip-path="url(#clip)">
    <g class="ticker">

      <text y="35">
        <tspan x="16" class="kw">products </tspan><tspan class="tag">[aws ec2] [gcp compute engine]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">regions </tspan><tspan class="tag">[us-east-1] [eu-west-1]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">specs </tspan><tspan class="tag">[vcpu=4] [memory=16gb]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">price </tspan><tspan class="tag">[&lt;0.5]</tspan>
      </text>

      <text y="67">
        <tspan x="16" class="kw">products </tspan><tspan class="tag">[aws bedrock] [azure openai]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">regions </tspan><tspan class="tag">[us-east-1] [us-west-2]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">specs </tspan><tspan class="tag">[model=claude] [type=input]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">price </tspan><tspan class="tag">[&lt;=0.01]</tspan>
      </text>

      <text y="99">
        <tspan x="16" class="kw">products </tspan><tspan class="tag">[aws rds] [gcp cloud sql]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">regions </tspan><tspan class="tag">[ap-southeast-1] [eu-central-1]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">specs </tspan><tspan class="tag">[engine=postgres] [vcpu=4]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">price </tspan><tspan class="tag">[&lt;=2.0]</tspan>
      </text>

      <text y="131">
        <tspan x="16" class="kw">products </tspan><tspan class="tag">[aws lambda] [gcp cloud run]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">regions </tspan><tspan class="tag">[us-west-2] [ap-northeast-1]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">specs </tspan><tspan class="tag">[runtime=python] [memory=512mb]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">price </tspan><tspan class="tag">[&gt;=0.0001]</tspan>
      </text>

      <!-- row 5 = row 1 for seamless loop -->
      <text y="163">
        <tspan x="16" class="kw">products </tspan><tspan class="tag">[aws ec2] [gcp compute engine]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">regions </tspan><tspan class="tag">[us-east-1] [eu-west-1]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">specs </tspan><tspan class="tag">[vcpu=4] [memory=16gb]</tspan>
        <tspan class="sep">  │  </tspan>
        <tspan class="kw">price </tspan><tspan class="tag">[&lt;0.5]</tspan>
      </text>

    </g>
  </g>
</svg>
